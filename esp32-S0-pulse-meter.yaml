substitutions:
  # ──────────────────────────────────────────────────────────────
  # SDM530 S0 impulse constant — check the label on your meter.
  # Common values: 800, 1000, 2000 pulses per kWh.
  # ──────────────────────────────────────────────────────────────
  pulses_per_kwh: "800"

esphome:
  name: esp32-sdm530
  friendly_name: ESP32 SDM530
  on_boot:
    priority: -100    # run after all components are initialised
    then:
      - pulse_meter.set_total_pulses:
          id: sdm530_pulse_meter
          value: !lambda 'return id(saved_total_pulses);'

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    # The API key is generated by the ESPHome dashboard when you first add this device.
    # Find it in the dashboard: device → Edit → api → encryption → key
    #
    # Option A — paste the key directly into this file (keep this file out of git):
    # key: "PASTE_YOUR_API_KEY_FROM_ESPHOME_DASHBOARD_HERE"

    # Option B — store it in secrets.yaml (see secrets.yaml.example) and reference it:
    # secrets.yaml entry:  esphome_api_key: "YOUR_API_KEY_HERE"
    key: !secret esphome_api_key

  # Allows resetting the total energy counter from Home Assistant to match the meter display.
  # Pass the raw pulse count (meter_kwh × pulses_per_kwh) as new_total_pulses.
  actions:
    - action: set_total_pulses
      variables:
        new_total_pulses: int
      then:
        - pulse_meter.set_total_pulses:
            id: sdm530_pulse_meter
            value: !lambda 'return new_total_pulses;'

ota:
  - platform: esphome
    # The OTA password is generated by the ESPHome dashboard when you first add this device.
    # Find it in the dashboard: device → Edit → ota → password
    #
    # Option A — paste directly:
    # password: "PASTE_YOUR_OTA_PASSWORD_FROM_ESPHOME_DASHBOARD_HERE"

    # Option B — use secrets.yaml:
    # secrets.yaml entry:  esphome_ota_password: "YOUR_OTA_PASSWORD_HERE"
    password: !secret esphome_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-Sdm530 Fallback Hotspot"
    # The fallback AP password is generated by the ESPHome dashboard when you first add this device.
    #
    # Option A — paste directly:
    # password: "PASTE_YOUR_FALLBACK_AP_PASSWORD_HERE"

    # Option B — use secrets.yaml:
    # secrets.yaml entry:  esphome_ap_password: "YOUR_AP_PASSWORD_HERE"
    password: !secret esphome_ap_password

captive_portal:

# Required for total_daily_energy to reset at midnight
time:
  - platform: homeassistant
    id: homeassistant_time

# Built-in LED — blinks once per S0 pulse for visual confirmation.
# GPIO2 is the most common pin on ESP32 dev boards (active HIGH, active LOW on some clones).
# If your LED does not blink after flashing, run esp32-led-finder.yaml to identify your pin.
output:
  - platform: gpio
    pin: GPIO2
    id: builtin_led

# ─────────────────────────────────────────────────────────────
# SDM530 S0 pulse interface — IEC 62053-31 passive NPN transistor
# Impulse constant: set via substitution 'pulses_per_kwh' at the top of this file
#
# The S0 output is a bare transistor switch (pins 8 & 9). It has NO internal
# power source — you must supply external 5-27V DC. On each energy pulse the
# transistor briefly closes, connecting pin 9 to pin 8.
#
# Per Eastron spec: supply 5-27V to Pin 9 (anode); read signal from Pin 8 (cathode).
#
# WIRING:
#
#   ESP32 5V (USB/VIN) ─────────────────── Pin 9  (S0 anode,  +)   ← full 5V per spec
#                                                 │
#                                          [NPN transistor - inside SDM530]
#                                                 │
#                                          Pin 8  (S0 cathode, -)
#                                                 │
#                                         R1 10kΩ (series)
#                                                 │
#   ESP32 GPIO18 ──────────────────────────────── ┤
#                                                 │
#                                         R2 20kΩ (pull-down)
#                                                 │
#   ESP32 GND ─────────────────────────────────── GND
#
#   Idle  : transistor OFF → GPIO pulled to 0V via R2              → logic LOW
#   Pulse : transistor ON  → 5V×20k/(10k+20k) = 3.33V at GPIO18   → logic HIGH
#
# Active-HIGH — no inversion needed. Both resistors on Pin 8 side only.
# Full 5V at Pin 9 (anode) — compliant with Eastron 5-27V spec.
# Current on pulse: 5V/30kΩ = 0.17 mA (max 27 mA).
# ─────────────────────────────────────────────────────────────
# Persistent raw pulse counter — survives reboots and power loss.
# Saved to ESP32 NVS flash every 60 s. Worst case loss on sudden power cut: 60 s of counting.
# (At 15 kW peak that is at most 15×60/3600 = 0.25 kWh — negligible.)

globals:
  - id: saved_total_pulses
    type: uint32_t          # matches pulse_meter's internal uint32_t counter
    restore_value: true     # written to NVS flash, survives any reboot/power loss
    initial_value: '0'

interval:
  - interval: 60s
    then:
      - globals.set:
          id: saved_total_pulses
          value: !lambda |-
            if (isnan(id(sdm530_total_energy).state)) return id(saved_total_pulses);
            return (uint32_t)(id(sdm530_total_energy).state * ${pulses_per_kwh} + 0.5);

# ─────────────────────────────────────────────────────────────
# Energy counter management
# Both entities are DISABLED BY DEFAULT — enable them in HA when needed:
#   Settings → Devices & Services → ESPHome → your device → enable the entity.
# ─────────────────────────────────────────────────────────────
button:
  # Resets Energy Total to zero. Useful when replacing the meter or starting a fresh measurement.
  - platform: template
    name: "Reset Energy Total"
    disabled_by_default: true
    icon: "mdi:counter"
    on_press:
      - pulse_meter.set_total_pulses:
          id: sdm530_pulse_meter
          value: !lambda 'return 0;'
      - globals.set:
          id: saved_total_pulses
          value: !lambda 'return 0;'

number:
  # Set Energy Total to match the physical meter display.
  # Useful when adding the ESP to an existing installation — type the kWh value
  # shown on the meter and the pulse count is synced automatically.
  #
  # Maximum: floor(2^32 - 1) / 800 imp/kWh = 5,368,709 kWh (~5.37 GWh)
  # This is the hard ceiling of ESPHome's uint32_t pulse counter.
  # HA's long-term statistics handle the rollover correctly if it is ever reached.
  # If you use a different pulses_per_kwh, reduce max_value: floor(4294967295 / your_rate).
  - platform: template
    name: "Set Energy Total"
    disabled_by_default: true
    icon: "mdi:circle-edit-outline"
    min_value: 0
    max_value: 5368709
    step: 0.001
    unit_of_measurement: "kWh"
    mode: box
    set_action:
      - pulse_meter.set_total_pulses:
          id: sdm530_pulse_meter
          value: !lambda 'return (uint32_t)(x * ${pulses_per_kwh} + 0.5);'
      - globals.set:
          id: saved_total_pulses
          value: !lambda 'return (uint32_t)(x * ${pulses_per_kwh} + 0.5);'

sensor:
  # Instantaneous power (W) — uses time between pulses for high resolution
  - platform: pulse_meter
    id: sdm530_pulse_meter
    name: "Power"
    pin:
      number: GPIO18
      mode:
        input: true
        pulldown: true          # Internal ~45kΩ pull-down parallel with external R2 20kΩ → ~14kΩ effective
        pullup: false
    # Minimum time between two accepted rising edges.
    # At 15 kW max load (800 imp/kWh) the fastest real pulse interval is 300 ms.
    # 250 ms filter rejects anything faster (finger/RF noise) while allowing up to ~18 kW.
    internal_filter: 250ms
    internal_filter_mode: EDGE   # EDGE: enforces minimum time between rising edges
    timeout: 5min            # Report 0 W after 5 min without a pulse (standby / very low load)
    on_value:
      - if:
          condition:
            lambda: 'return x > 0;'   # skip the 0 W timeout publication
          then:
            - output.turn_on: builtin_led
            - delay: 50ms
            - output.turn_off: builtin_led
    unit_of_measurement: "W"
    icon: "mdi:flash"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters:
      # pulses/min × (60 min/hr ÷ pulses_per_kwh) × 1000 W/kW
      - multiply: !lambda return 60000.0 / ${pulses_per_kwh};

    # Cumulative energy counter — persists across reboots via ESPHome flash storage
    total:
      id: sdm530_total_energy
      name: "Energy Total"
      unit_of_measurement: "kWh"
      icon: "mdi:lightning-bolt"
      device_class: energy
      state_class: total_increasing
      accuracy_decimals: 3
      filters:
        # 1 pulse = (1 / pulses_per_kwh) kWh
        - multiply: !lambda return 1.0 / ${pulses_per_kwh};

  # Daily energy — resets to 0 at midnight using HA time.
  # Persists across ESP reboots via ESPHome's internal restore mechanism.
  - platform: total_daily_energy
    name: "Daily Energy"
    power_id: sdm530_pulse_meter   # power in W → integrates to Wh
    unit_of_measurement: "kWh"
    icon: "mdi:lightning-bolt"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001            # Wh → kWh
  # NOTE: lifetime energy tracking is handled by Home Assistant's own long-term
  # statistics. HA uses state_class: total_increasing on Energy Total and Daily Energy
  # to accumulate across ESP reboots in its own database — no extra sensor needed.
    